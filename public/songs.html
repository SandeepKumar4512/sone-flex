<!DOCTYPE html>        <html>        
<head>        
<meta charset="UTF-8">        
<title>SoneFlex music</title>        
<style>        
body{background:#000;color:white;font-family:Arial;margin:0;padding:20px;}        
h2{color:#1db954;}        
input, select, button{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none;font-size:16px;}        
input, select{background:#222;color:white;}        
button{background:#1db954;color:#000;font-weight:bold;cursor:pointer;}        
.artist-option{display:flex;align-items:center;gap:10px;margin:5px 0;padding:5px;background:#111;border-radius:8px;cursor:pointer;}        
.artist-option img{width:40px;height:40px;border-radius:50%;}        
#artistList{max-height:200px;overflow-y:auto;}        
.song-card{background:#111;padding:10px;margin:10px 0;border-radius:10px;}        
.song-card img{border-radius:10px;}        
.artist-info{display:flex;align-items:center;gap:10px;margin-top:5px;}        
.artist-info img{width:30px;height:30px;border-radius:50%;}        
</style>        
</head>        
<body>        
<h2>🎵 Upload Song</h2>        <label>Search Artist:</label>
<input type="text" id="artistSearch" placeholder="Type artist name">

<div id="artistList"></div>        <form id="uploadForm" enctype="multipart/form-data" style="display:none;">        
    <input type="hidden" name="artistId" id="artistId">        
    <input type="text" name="title" placeholder="Song Title" required>        Language:        
<select name="language" required>        
  <option value="">Select Language</option>        
</select>        
    
Category:        
<select name="category" required>        
  <option value="">Select Category</option>        
</select>        
    
Audio: <input type="file" name="audio" accept="audio/*" required>        
Cover: <input type="file" name="cover" accept="image/*" required>        
    
<button type="submit">Upload</button>

</form>        <h2>🎶 All Songs</h2>        
<div id="songsList"></div>        <script>        
  
// 🔥 FULL LANGUAGES BACK  
const languages = ["Hindi","English","Punjabi","Bhojpuri","Telugu","Tamil","Bengali","Malayalam","Gujarati","Rajasthani","Marathi","Oriya","Assamese","Kannada","Haryanvi","Spanish","French","German","Japanese","Korean","Arabic","Portuguese","Russian","Chinese","Urdu","Persian","Italian","Turkish","Swahili","Nepali","Sinhala","Maithili","Santali","Dogri","Konkani","Manipuri","Kashmiri","Bodo","Mizo","Khasi","Tulu","Garo","Bengali Sylheti","Chhattisgarhi","Garhwali","Himachali","Kokborok","Ladakhi","Lepcha","Limbu","Mundari","Pahari","Rangpuri","Sanskrit","Santhali","Urhobo","Yoruba"];  
  
// 🔥 FULL CATEGORIES BACK  
const categories = ["Trending","Top Charts","New Releases","Love","Romantic","Sad","Heartbreak","Party","Dance","Club","LoFi","Chill","Workout","Gym","Motivation","Focus","Study","Sleep","Relax","Devotional","Bhakti","Festival","Desi Hits","Classical","Folk","Instrumental","Jazz","Hip Hop","Pop","Rock","EDM","Rap","Metal","Soul","Blues","Reggae","Country","Alternative","Indie","Ambient","Meditation","Prayer","Wedding","Cultural","Regional","Patriotic","Kids","Children","Comedy","Experimental","Soundtrack","Background Score","Vocal","Acoustic","Electronic","Fusion","Remix","Mashup","Carnatic","Hindustani","Bollywood","Tollywood","Kollywood","Punjabi Pop","Bhojpuri Hits","Chillhop","Gaming","Workout Mix","Morning Vibes","Night Vibes","Rainy Day","Road Trip"];  
  
const languageSelect = document.querySelector('select[name="language"]');        
const categorySelect = document.querySelector('select[name="category"]');        
languages.forEach(l=>languageSelect.innerHTML+=`<option value="${l}">${l}</option>`);        
categories.forEach(c=>categorySelect.innerHTML+=`<option value="${c}">${c}</option>`);        
        
const artistSearch = document.getElementById("artistSearch");        
const artistList = document.getElementById("artistList");        
const uploadForm = document.getElementById("uploadForm");        
const artistIdInput = document.getElementById("artistId");        
const songsList = document.getElementById("songsList");        
        
// 🔥 SEARCH        
artistSearch.addEventListener("input", async ()=>{        
    const query = artistSearch.value.trim();        
    artistList.innerHTML="";        
    if(!query) return;        
        
    const res = await fetch(`/api/artist/search?q=${query}`);        
    const artists = await res.json();        
        
    if(artists.length === 0){        
        artistList.innerHTML = `        
        <div style="padding:10px;">        
          ❌ Artist not found<br>        
          <button onclick="createArtist('${query}')">➕ Create "${query}"</button>        
        </div>`;        
        return;        
    }        
        
    artists.forEach(a=>{        
        const div = document.createElement("div");        
        div.className="artist-option";        
        div.innerHTML=`<img src="/uploads/${a.profilePic || 'default.png'}">${a.name}`;        
        
        div.onclick=()=>{        
            artistIdInput.value = a._id;        
            uploadForm.style.display="block";        
            artistList.innerHTML = `<p>Selected: <img src="/uploads/${a.profilePic || 'default.png'}" style="width:40px;height:40px;border-radius:50%;"> ${a.name}</p>`;        
        };        
        
        artistList.appendChild(div);        
    });        
});        
        
// 🔥 CREATE ARTIST        
async function createArtist(name){        
    const formData = new FormData();        
    formData.append("name", name);        
    formData.append("email", name + "@auto.com");        
    formData.append("password", "123456");        
        
    const res = await fetch("/api/artist/register",{        
        method:"POST",        
        body:formData        
    });        
        
    const data = await res.json();        
        
    if(data.artist){        
        artistIdInput.value = data.artist._id;        
        uploadForm.style.display="block";        
        artistList.innerHTML = `<p>Selected: ${data.artist.name}</p>`;        
    }        
}        
        
// Upload        
uploadForm.addEventListener("submit", async e=>{        
    e.preventDefault();        
    const data = new FormData(uploadForm);        
    data.append("artistId", artistIdInput.value);        
        
    const res = await fetch("/api/upload",{method:"POST",body:data});        
    const json = await res.json();        
    alert(json.message);        
    loadSongs();        
});        
        
// 🔥 LOAD SONGS WITH ARTIST PROFILE        
async function loadSongs(){        
    const res = await fetch("/api/songs");        
    const songs = await res.json();        
    songsList.innerHTML="";        
        
    for(const s of songs){        
        let artistData = {};        
        try {        
            const r = await fetch(`/api/artist/${s.artistId}`);        
            artistData = await r.json();        
        } catch(e) {}        
        
        songsList.innerHTML += `        
        <div class="song-card">        
            <b>${s.title}</b><br>        
        
            <div class="artist-info">        
                <img src="/uploads/${artistData.artist?.profilePic || 'default.png'}">        
                <span>${s.artist}</span>        
            </div>        
        
            <small>${s.language} | ${s.category}</small><br>        
            <audio controls src="/uploads/${s.audio_file}"></audio><br>        
            <img src="/uploads/${s.cover_image}" width="120">        
        </div>`;        
    }        
}        
        
loadSongs();        
</script>        </body>        
</html>
