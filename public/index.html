<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoneFlex Pro UI</title>

<style>
body{margin:0;background:#000;color:white;font-family:Arial;}

.hero{height:260px;background:url('/uploads/banner.jpg') center/cover;position:relative;}
.hero h1{position:absolute;bottom:20px;left:20px;font-size:28px;}

.profile{position:absolute;top:10px;right:10px;text-align:center;}
.profile img{width:40px;height:40px;border-radius:50%;}

#searchBox{
width:90%;
margin:10px auto;
display:block;
padding:10px;
border-radius:10px;
border:none;
background:#222;
color:white;
}

/* LANG */
.scroll{display:flex;overflow-x:auto;gap:10px;padding:10px;}
.scroll div{background:#222;padding:8px 15px;border-radius:20px;cursor:pointer;white-space:nowrap;}

/* CATEGORY */
.category{display:flex;overflow-x:auto;gap:10px;padding:10px;}
.category div{background:linear-gradient(45deg,#ff0080,#ff8c00);padding:10px;border-radius:10px;cursor:pointer;white-space:nowrap;}

.grid{display:flex;overflow-x:auto;gap:10px;padding:10px;}
.card{min-width:140px;background:#111;border-radius:10px;padding:5px;}
.card img{width:100%;border-radius:10px;}

#miniPlayer{
position:fixed;bottom:60px;width:100%;
background:#111;display:none;
align-items:center;gap:10px;padding:10px;
z-index:100;
}

#fullPlayer{
position:fixed;top:0;left:0;width:100%;height:100%;
display:none;flex-direction:column;
background:#000;z-index:999;overflow-y:auto;
}

#closeBtn{position:absolute;top:10px;right:15px;font-size:22px;cursor:pointer;}

#fullCover{
width:90%;
max-width:350px;
border-radius:20px;
margin:20px auto;
display:block;
}

#fullTitle{text-align:center;font-size:20px;}

#progressBar{width:90%;height:4px;background:#333;margin:10px auto;border-radius:5px;}
#progress{height:100%;width:0%;background:#1db954;}

#time{
width:90%;margin:auto;
display:flex;justify-content:space-between;
font-size:12px;color:#aaa;
}

#lyricsBox{
height:200px;
overflow-y:auto;
padding:10px;
text-align:center;
font-size:14px;
color:#aaa;
}

#artistBox{text-align:center;margin-top:10px;}
#artistPic{width:80px;height:80px;border-radius:50%;}

#nextList{padding:10px;}
.nextItem{display:flex;gap:10px;margin:10px 0;cursor:pointer;}
.nextItem img{width:60px;border-radius:8px;}

.nav{position:fixed;bottom:0;width:100%;background:#111;display:flex;justify-content:space-around;padding:10px 0;}
</style>
</head>

<body>

<div class="hero">
  <div class="profile">
    <img src="/uploads/default.png">
    <div>Profile</div>
  </div>
  <h1>ट्रेंडिंग सोंग</h1>
</div>

<input type="text" id="searchBox" placeholder="🔍 Search songs, artists...">

<!-- 🔥 LANGUAGE -->
<div class="scroll" id="languageList"></div>

<!-- 🔥 CATEGORY -->
<div class="category" id="categoryList"></div>

<div class="grid" id="songs"></div>

<!-- MINI -->
<div id="miniPlayer">
  <img id="miniCover" style="width:50px;height:50px;border-radius:8px;">
  <div style="flex:1;">
    <div id="miniTitle"></div>
    <small id="miniArtist"></small>
  </div>
  <button onclick="openFullPlayer()">⬆</button>
</div>

<!-- FULL -->
<div id="fullPlayer">
  <div id="closeBtn" onclick="closeFullPlayer()">❌</div>

  <img id="fullCover">
  <h2 id="fullTitle"></h2>

  <div id="progressBar"><div id="progress"></div></div>

  <div id="time">
    <span id="currentTime">0:00</span>
    <span id="duration">0:00</span>
  </div>

  <audio id="mainAudio" controls></audio>

  <div id="lyricsBox"></div>

  <div id="artistBox">
    <img id="artistPic" src="/uploads/default.png">
    <div id="artistName"></div>
  </div>

  <div id="nextList"></div>
</div>

<div class="nav">
  <div>🏠<br>Home</div>
  <div>🔍<br>Search</div>
  <div>🎵<br>Library</div>
  <div>⭐<br>Upgrade</div>
</div>

<script>

// 🔥 FULL LANGUAGE LIST
const languages = ["All","Hindi","English","Punjabi","Bhojpuri","Telugu","Tamil","Bengali","Malayalam","Gujarati","Rajasthani","Marathi","Oriya","Assamese","Kannada","Haryanvi","Spanish","French","German","Japanese","Korean","Arabic","Portuguese","Russian","Chinese","Urdu","Persian","Italian","Turkish","Swahili","Nepali","Sinhala","Maithili","Santali","Dogri","Konkani","Manipuri","Kashmiri","Bodo","Mizo","Khasi","Tulu","Garo","Bengali Sylheti","Chhattisgarhi","Garhwali","Himachali","Kokborok","Ladakhi","Lepcha","Limbu","Mundari","Pahari","Rangpuri","Sanskrit","Santhali","Urhobo","Yoruba"];

// 🔥 FULL CATEGORY LIST
const categories = ["Trending","Top Charts","New Releases","Love","Romantic","Sad","Heartbreak","Party","Dance","Club","LoFi","Chill","Workout","Gym","Motivation","Focus","Study","Sleep","Relax","Devotional","Bhakti","Festival","Desi Hits","Classical","Folk","Instrumental","Jazz","Hip Hop","Pop","Rock","EDM","Rap","Metal","Soul","Blues","Reggae","Country","Alternative","Indie","Ambient","Meditation","Prayer","Wedding","Cultural","Regional","Patriotic","Kids","Children","Comedy","Experimental","Soundtrack","Background Score","Vocal","Acoustic","Electronic","Fusion","Remix","Mashup","Carnatic","Hindustani","Bollywood","Tollywood","Kollywood","Punjabi Pop","Bhojpuri Hits","Chillhop","Gaming","Workout Mix","Morning Vibes","Night Vibes","Rainy Day","Road Trip"];

languages.forEach(l=>{
  let d=document.createElement("div");
  d.innerText=l;
  d.onclick=()=>filterSongs(l,null);
  languageList.appendChild(d);
});

categories.forEach(c=>{
  let d=document.createElement("div");
  d.innerText=c;
  d.onclick=()=>filterSongs(null,c);
  categoryList.appendChild(d);
});

// बाकी तुम्हारा कोड SAME है (कोई छेड़खानी नहीं)

</script>

</body>
</html>
