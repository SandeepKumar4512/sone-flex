<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial;
}

.topBar{
display:flex;
justify-content:space-between;
padding:15px;
font-size:20px;
}

#cover{
width:85%;
max-width:320px;
border-radius:20px;
margin:20px auto;
display:block;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

#title{text-align:center;font-size:18px;margin-top:10px;}
#artist{text-align:center;color:#aaa;font-size:14px;}

#progressBar{
width:90%;
height:4px;
background:#333;
margin:15px auto;
border-radius:10px;
overflow:hidden;
}
#progress{height:100%;width:0%;background:#1db954;}

.time{
width:90%;
margin:auto;
display:flex;
justify-content:space-between;
font-size:12px;
color:#aaa;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:20px;
font-size:22px;
}

.controls button{
background:#111;
border:none;
color:white;
padding:12px;
border-radius:50%;
}

.playBtn{
font-size:26px;
background:#1db954 !important;
}

/* NEW BUTTONS */
.extra{
display:flex;
justify-content:center;
gap:20px;
margin-top:15px;
}
.extra button, .extra a{
background:#111;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
text-decoration:none;
}

#lyricsBox{
height:150px;
overflow-y:auto;
text-align:center;
color:#aaa;
margin-top:15px;
}

.next{padding:10px;margin-top:20px;}
.item{display:flex;gap:10px;margin:10px 0;cursor:pointer;}
.item img{width:60px;border-radius:8px;}
</style>
</head>

<body>

<div class="topBar">
<div onclick="goBack()">⬇</div>
<div>🎵 Playing</div>
<div>⋮</div>
</div>

<img id="cover">
<h2 id="title"></h2>
<div id="artist"></div>

<div id="progressBar"><div id="progress"></div></div>

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>

<audio id="audio" playsinline></audio>

<div class="controls">
<button onclick="prev()">⏮</button>
<button class="playBtn" onclick="togglePlay()" id="playBtn">▶</button>
<button onclick="next()">⏭</button>
</div>

<!-- 🔥 EXTRA FEATURES -->
<div class="extra">
<button onclick="likeSong()">❤️ Like</button>
<a id="downloadBtn" download>⬇ Download</a>
</div>

<!-- 🎤 LYRICS -->
<div id="lyricsBox"></div>

<div class="next" id="nextList"></div>

<script>

let songs=[];
let index=localStorage.getItem("songIndex")||0;
const audio=document.getElementById("audio");

async function load(){
  const res=await fetch("http://localhost:5000/api/songs");
  songs=await res.json();
  play(index);
}

function play(i){
  index=i;
  const s=songs[i];

  cover.src="/uploads/"+s.cover_image;
  title.innerText=s.title;
  artist.innerText=s.artistName;

  audio.src="/uploads/"+s.audio_file;
  audio.play();

  downloadBtn.href="/uploads/"+s.audio_file;

  loadNext();
  loadLyrics();
}

// ❤️ LIKE
function likeSong(){
  fetch("http://localhost:5000/api/favorite/add",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({songId:songs[index]._id})
  })
  .then(()=>alert("❤️ Added to Favorite"));
}

// PLAY / PAUSE
function togglePlay(){
  if(audio.paused){
    audio.play();
    playBtn.innerText="⏸";
  }else{
    audio.pause();
    playBtn.innerText="▶";
  }
}

// NEXT / PREV
function next(){
  index=(parseInt(index)+1)%songs.length;
  play(index);
}
function prev(){
  index=(index-1+songs.length)%songs.length;
  play(index);
}

// TIME
function formatTime(sec){
  sec=Math.floor(sec);
  let m=Math.floor(sec/60);
  let s=sec%60;
  return m+":"+(s<10?"0"+s:s);
}

// PROGRESS + LYRICS SYNC
audio.addEventListener("timeupdate",()=>{
  progress.style.width=(audio.currentTime/audio.duration)*100+"%";
  current.innerText=formatTime(audio.currentTime);
  duration.innerText=formatTime(audio.duration||0);

  syncLyrics(audio.currentTime);
});

// AUTO NEXT
audio.addEventListener("ended", next);

// NEXT LIST
function loadNext(){
  nextList.innerHTML="<h3>Next Songs</h3>";

  songs.forEach((s,i)=>{
    if(i!=index){
      nextList.innerHTML+=`
      <div class="item" onclick="play(${i})">
        <img src="/uploads/${s.cover_image}">
        <div>
          <b>${s.title}</b><br>
          <small>${s.artistName}</small>
        </div>
      </div>`;
    }
  });
}

// 🎤 LYRICS
let lyrics=[
{time:0,text:"🎵 Start"},
{time:5,text:"Music vibe..."},
{time:10,text:"Feel the beat"},
{time:15,text:"Sone Flex 🔥"}
];

function loadLyrics(){
  lyricsBox.innerHTML="";
  lyrics.forEach(l=>{
    lyricsBox.innerHTML+=`<div class="line">${l.text}</div>`;
  });
}

function syncLyrics(current){
  const lines=document.querySelectorAll(".line");
  lyrics.forEach((l,i)=>{
    if(current>=l.time){
      lines.forEach(el=>el.style.color="#aaa");
      if(lines[i]){
        lines[i].style.color="#1db954";
        lines[i].scrollIntoView({behavior:"smooth",block:"center"});
      }
    }
  });
}

// BACK
function goBack(){
  window.location.href="index.html";
}

load();

</script>

</body>
</html>
