<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoneFlex</title>

<style>
body{margin:0;background:#000;color:white;font-family:Arial;}
.grid{display:flex;overflow-x:auto;gap:10px;padding:10px;}
.card{min-width:140px;background:#111;border-radius:10px;padding:5px;}
.card img{width:100%;border-radius:10px;}

#miniPlayer{
position:fixed;bottom:0;width:100%;
background:#111;display:none;
padding:10px;display:flex;gap:10px;
}
</style>
</head>

<body>

<h2 style="padding:10px;">🔥 Sone Flex</h2>

<div class="grid" id="songs"></div>

<div id="miniPlayer">
<img id="miniCover" width="50">
<div>
<div id="miniTitle"></div>
<small id="miniArtist"></small>
</div>
<button onclick="openPlayer()">▶</button>
</div>

<script>

let allSongs=[];
let currentIndex=0;

async function loadSongs(){
  const res = await fetch("http://localhost:5000/api/songs");
  allSongs = await res.json();

  songs.innerHTML="";
  allSongs.forEach((s,i)=>{
    songs.innerHTML+=`
    <div class="card" onclick="playSong(${i})">
      <img src="/uploads/${s.cover_image}">
      <div>${s.title}</div>
    </div>`;
  });
}

function playSong(i){
  localStorage.setItem("songIndex",i);
  window.location.href="player.html";
}

function openPlayer(){
  window.location.href="player.html";
}

loadSongs();

</script>

</body>
</html>
